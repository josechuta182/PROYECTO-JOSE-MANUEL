  <!DOCTYPE html>
<html lang="es">
<head>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #000000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  display: flex;
  width: 800px;
  height: 450px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  position: relative;
}

.panel {
  width: 50%;
  padding: 40px 30px;
}

.left {
  background: rgb(255, 255, 255);
}

.right {
  background: linear-gradient(135deg, #0e418e, #02115c);
  color: rgb(0, 0, 0);
}

h2 {
  margin-bottom: 25px;
  font-weight: normal;
}

input {
  width: 100%;
  border: none;
  border-bottom: 1px solid #000000;
  padding: 10px 0;
  margin-bottom: 20px;
  outline: none;
  background: transparent;
  font-size: 14px;
}

.btn-register {
  background: #0115ab;
  color: rgb(0, 0, 0);
  border: none;
  padding: 12px 25px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
}

.btn-register:hover {
  opacity: 0.9;
}

.social-btn {
  display: flex;
  align-items: center;
  padding: 12px;
  margin-bottom: 15px;
  cursor: pointer;
  font-size: 14px;
}

.social-btn i {
  margin-right: 15px;
  width: 20px;
}

.fb { background: #065b91; }
.tw { background: #0862c9; }
.email { background: #0374ca; }

.switch {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: rgb(1, 15, 101);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  font-weight: bold;
  color: #0083b0;
}
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

</style>

  <meta charset="UTF-8">
  <title>Registrarse</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">

 <video class="video" autoplay muted loop>
                <source src="video.mp11.mp4"type="video/mp4">
              </video>


    
    <!-- Lado izquierdo: Registrarse -->
    <div class="panel left">
      <h2>Registrarse</h2>
      <form>
        <input type="text" placeholder="Nombre">
        <input type="email" placeholder="Correo">
        <input type="password" placeholder="Contraseña">
        <input type="password" placeholder="Confirmar contraseña">
        <button type="button" class="btn-register">REGISTRARSE</button>
      </form>
    </div>

    <!-- Flecha del medio -->
    <div class="switch">
      <span>></span>
    </div>

    <!-- Lado derecho: Iniciar Sesión -->
    <div class="panel right">
      <h2>Iniciar Sesión</h2>
      <div class="social-btn fb">
        <i class="fab fa-facebook-f"></i> Acceder con Facebook
      </div>
      <div class="social-btn tw">
        <i class="fab fa-twitter"></i> Acceder con Twitter
      </div>
      <div class="social-btn email">
        <i class="fas fa-envelope"></i> Acceder con Correo
      </div>
    </div>

  </div>
</body>
</html>
