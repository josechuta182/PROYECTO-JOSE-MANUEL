<!DOCTYPE html>
<html lang="es">
<head>

<Style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #003c43, #056ab6);
  margin: 0%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-container {
  width: 100%;
  padding: 20px;
}

.login-box {
  background: rgb(255, 255, 255);
  width: 320px;
  margin: 0 auto;
  padding: 40px 30px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  text-align: center;
}

.avatar {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;
  border: 3px solid #4a90e2;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.avatar svg {
  width: 50px;
  height: 50px;
}

.avatar {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;
  border: 3px solid #4a90e2;
  border-radius: 50%;
  overflow: hidden; /* Esto recorta la imagen en círculo */
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Evita que la imagen se deforme */
}


input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #05544d;
  border-radius: 6px;
  font-size: 14px;
  outline: none;
}

input[type="text"]:focus,
input[type="password"]:focus {
  border-color: #4a90e2;
}

.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  margin: 15px 0;
  color: #555;
}

.options a {
  color: #4a90e2;
  text-decoration: none;
}

button {
  width: 100%;
  padding: 12px;
  background: rgb(254, 255, 255);
  color: #4a90e2;
  border: 2px solid #4a90e2;
  border-radius: 6px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4a90e2;
  color: rgb(5, 101, 106);

}
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


</Style>



  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Inicio de Sesión</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">

        <video class="video" autoplay muted loop>
                <source src="videos.mp3/video.mp9.mp4"type="video/mp4">
              </video>


    <div class="login-box">
      
      <div class="avatar">
        <img src="imagenes/logo.jpg" alt="ususario">
        <svg viewBox="0 0 24 24" fill="#4a90e2">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>

      <form>
        <input type="text" placeholder="Nombre de ususario">
        <input type="password" placeholder="Contraseña">
        
        <div class="options">
          <label>
            <input type="checkbox"> Recordarme
          </label>
          <a href="#">Olvido su contraseña?</a>
        </div>

        <button type="button">INICIAR SESIÓN</button>
      </form>

    </div>
  </div>
</body>
</html>
