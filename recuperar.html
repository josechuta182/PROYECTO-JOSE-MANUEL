 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:350px;
    height:650px;
    background:linear-gradient(to bottom,#4282db,#0a2f93);
    border-radius:50px;
    padding:40px 25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    position:relative;
}

.icono{
    width:220px;
    height:220px;
    background:#f8e9a1;
    border-radius:50%;
    margin:20px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:100px;
}

.formulario{
    background:#2561b5;
    padding:40px 20px;
    border-radius:40px;
    margin-top:40px;
}

h2{
    color:white;
    text-align:center;
    margin-bottom:30px;
    font-size:28px;
}

.input-box{
    background:#011b4f;
    border-radius:40px;
    padding:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

input{
    background:none;
    border:none;
    outline:none;
    color:white;
    padding-left:15px;
    font-size:18px;
    width:100%;
}

button{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:#055b9c;
    color:rgb(0, 0, 0);
    font-size:24px;
    cursor:pointer;
}

p{
    color:white;
    text-align:center;
    margin-top:25px;
    font-size:16px;
}

video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
</style>

<body>

<div class="card">


 <video class="video" autoplay muted loop>
                <source src="video.mp13.mp4"type="video/mp4">
              </video>

    <div class="icono"> 🔏
    </div>
    <div class="formulario">

        <h2>Restablecer contraseña</h2>

        <div class="input-box">
            <input type="password" placeholder="Ingrese su contraseña">
            <button>➜</button>
        </div>

        <p>¿Olvidó su contraseña?</p>

    </div>

</div>

</body>
</html>
